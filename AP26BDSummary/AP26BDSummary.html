<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission 2026 — বোর্ড ডাটা সামারি</title>

<script>
  const CONFIG = {
    CSV_URL: "https://docs.google.com/spreadsheets/d/1sGCJFSykLxhnDT_bj91esMpkqt9IFzTO1-SaW3e7XXo/export?format=csv&gid=919747679",
    REFRESH_MINUTES: 5
  };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@600;700&family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hind Siliguri", sans-serif;-webkit-font-smoothing:antialiased;transition:background .25s ease, color .25s ease;display:flex;flex-direction:column;overflow:hidden;}

  .top-wrap{max-width:1180px;margin:0 auto;padding:10px 20px 0;width:100%;flex:0 0 auto;}
  .error-box{padding:14px 16px;border-radius:8px;font-size:13.5px;margin-bottom:20px;}
  .stat-count{margin-bottom:2px;}
  .stat-pct{font-size:12.5px;font-weight:700;padding:1px 8px;border-radius:20px;display:inline-block;}
  .table-scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:820px;}
  thead th{text-align:center;font-size:16px;font-weight:800;color:var(--ink);letter-spacing:.2px;padding:5px 8px;white-space:nowrap;}
  thead th.left{text-align:left;}
  tbody td{padding:5px 8px;text-align:center;font-size:16px;font-weight:800;color:var(--ink);letter-spacing:.2px;}
  tbody td.left{text-align:left;}
  td.indent{padding-left:26px;}
  .table-card h2{text-align:center;}
  .ledger-top{text-align:center;position:relative;flex:0 0 auto;}

  /* ============ KPI সেকশন — মিডিল এলাইন + সংখ্যা এক লাইনে + স্ক্রলে ফিক্সড ============ */
  .kpi-row{padding:8px 0 6px;border-bottom:1px solid var(--line);}
  .kpi{text-align:center;}
  .kpi .eyebrow{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .kpi .num{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* ============ এক-উইন্ডোতে-এক-সেকশন স্ক্রল-স্ন্যাপ (KPI-এর নিচের অংশ) ============ */
  .scroll-viewport{flex:1 1 auto;min-height:0;overflow-y:auto;scroll-snap-type:y mandatory;scroll-behavior:smooth;}
  .snap-section{height:100%;overflow:hidden;display:flex;scroll-snap-align:start;scroll-snap-stop:always;}
  .snap-section .wrap{max-width:1180px;width:100%;margin:auto;padding:10px 20px;}
  .snap-section .wrap.fill{margin:0 auto;height:100%;display:flex;flex-direction:column;}

  /* বড় (Branch/Branch-Program Wise) টেবিলের নিজস্ব ভার্টিক্যাল স্ক্রল + sticky header */
  .table-card.scroll-body{display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}
  .table-card.scroll-body .table-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;}
  .table-card.scroll-body thead th{position:sticky;top:0;background:var(--panel);z-index:2;}

  /* Branch & Program Wise গ্রুপ-হেডার রো */
  .group-row td{background:var(--line);font-weight:700;padding:9px 8px;}
  .group-total{font-weight:500;font-size:11px;color:var(--ink-soft);margin-left:10px;}

  .snap-dots{position:fixed;right:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;z-index:150;}
  .snap-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--ink-soft, #94A3B8);background:transparent;padding:0;cursor:pointer;opacity:.5;transition:all .2s ease;}
  .snap-dot:hover{opacity:.85;}
  .snap-dot.active{background:var(--ink, #0F172A);border-color:var(--ink, #0F172A);opacity:1;transform:scale(1.2);}

  /* ============ ফ্লোটিং থিম/প্যালেট কাস্টমাইজার (থিম-নিরপেক্ষ) ============ */
  .theme-fab{position:fixed;right:22px;bottom:22px;width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 18px rgba(0,0,0,.28);background:var(--ink);color:#fff;line-height:1;}
  .theme-panel{position:fixed;right:22px;bottom:84px;width:200px;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 34px rgba(0,0,0,.24);padding:14px;z-index:200;display:none;color:var(--ink);font-family:"Hind Siliguri",sans-serif;}
  .theme-panel.open{display:block;}
  .tp-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);font-weight:700;margin:0 0 8px;}
  .tp-label.tp-label-2{margin-top:14px;}
  .tp-theme-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:12px;}
  .tp-theme-row:hover{background:var(--line);}
  .tp-theme-row.active{background:var(--line);font-weight:700;}
  .tp-swatch{width:13px;height:13px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.15);}
  .tp-palette-row{display:flex;gap:12px;}
  .tp-color-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .tp-color-col span{font-size:10px;color:var(--ink-soft);}
  input[type=color].tp-color-input{width:28px;height:28px;padding:0;border:2px solid var(--line);border-radius:50%;cursor:pointer;background:none;}
  input[type=color].tp-color-input::-webkit-color-swatch-wrapper{padding:0;border-radius:50%;}
  input[type=color].tp-color-input::-webkit-color-swatch{border:none;border-radius:50%;}
  .tp-reset-btn{width:100%;margin-top:12px;padding:7px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--ink-soft);font-size:11px;cursor:pointer;font-weight:600;}
  .tp-reset-btn:hover{background:var(--line);}

  /* ============ ফ্লোটিং "View By" পিকার (থিম-পিকারের প্রতিসম, বিপরীত কোনায়) ============ */
  .view-fab{position:fixed;left:22px;bottom:22px;width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 18px rgba(0,0,0,.28);background:var(--ink);color:#fff;line-height:1;}
  .view-panel{position:fixed;left:22px;bottom:84px;width:210px;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 34px rgba(0,0,0,.24);padding:14px;z-index:200;display:none;color:var(--ink);font-family:"Hind Siliguri",sans-serif;}
  .view-panel.open{display:block;}

  /* ============ প্রোগ্রাম-সেকশন কমন কম্পোনেন্ট (থিম-নিরপেক্ষ, ভেরিয়েবল দিয়ে থিম মেনে চলে) ============ */
  .ref-table-heading{font-size:12px;font-weight:600;color:var(--ink-soft);margin:22px 0 10px;padding-top:4px;letter-spacing:.3px;}

  /* রেস-বার তুলনা */
  .race-cols{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;}
  .race-col{border-left:1px solid var(--line);padding-left:24px;}
  .race-col:first-child{border-left:none;padding-left:0;}
  .race-col-head{font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:var(--ink-soft);margin-bottom:10px;}
  .race-group{padding:12px 0;border-bottom:1px solid var(--line);}
  .race-group:last-child{border-bottom:none;}
  .race-title{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:8px;}
  .race-title .race-total{font-size:11px;font-weight:500;color:var(--ink-soft);}
  .race-row{display:grid;grid-template-columns:72px 1fr 96px;align-items:center;gap:8px;margin-bottom:5px;}
  .race-row:last-child{margin-bottom:0;}
  .race-label{font-size:10.5px;color:var(--ink-soft);font-weight:600;white-space:nowrap;}
  .race-track{height:9px;border-radius:5px;background:var(--line);overflow:hidden;}
  .race-track i{display:block;height:100%;border-radius:5px;}
  .race-pct{font-size:11px;color:var(--ink);font-weight:800;text-align:right;white-space:nowrap;}

  /* =========================================================
     থিম ১ — ক্লাসিক লেজার (আগের ডিজাইন)
     ========================================================= */
  body[data-theme="1"]{
    --ink:#1B2A4A; --ink-soft:#3A4A6B; --paper:#F7F5F0; --panel:#FFFFFF;
    --gold:#C9A227; --gold-soft:#EFE3B8; --line:#E3DFD3; --good:#1E7A4C; --bad:#B4432E;
    --ssc:#1B2A4A; --hsc:#8A6FB0; --radius:10px;
    background:var(--paper);color:var(--ink);
  }
  body[data-theme="1"] .ledger-top{background:var(--ink);color:#fff;padding:16px 24px 13px;overflow:hidden;}
  body[data-theme="1"] .ledger-top::after{content:"";position:absolute;left:0;right:0;bottom:0;height:6px;background:repeating-linear-gradient(90deg,var(--gold) 0 18px, transparent 18px 26px);}
  body[data-theme="1"] .ledger-top h1{font-family:"Noto Serif Bengali", serif;font-size:clamp(16px,2.4vw,21px);margin:0 0 2px;}
  body[data-theme="1"] .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:12px;}
  body[data-theme="1"] .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px 14px;position:relative;}
  body[data-theme="1"] .kpi .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-soft);margin-bottom:8px;font-weight:600;}
  body[data-theme="1"] .kpi .num{font-family:"Noto Serif Bengali", serif;font-size:21px;font-weight:700;color:var(--ink);}
  body[data-theme="1"] .kpi::before{content:"";position:absolute;top:0;left:18px;right:18px;height:3px;background:var(--gold);border-radius:0 0 3px 3px;}
  body[data-theme="1"] .card,
  body[data-theme="1"] .table-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;}
  body[data-theme="1"] .card h2,
  body[data-theme="1"] .table-card h2{font-family:"Noto Serif Bengali", serif;font-size:15.5px;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--line);color:var(--ink);}
  body[data-theme="1"] thead th{color:var(--ink);border-bottom:2px solid var(--ink);}
  body[data-theme="1"] tbody td{border-bottom:1px solid var(--line);}
  body[data-theme="1"] tbody tr:hover{background:#FAF8F2;}
  body[data-theme="1"] tr.total-row td{background:#FBF3E4;border-top:2px solid var(--gold);}
  body[data-theme="1"] .error-box{background:#F7E5E1;border:1px solid var(--bad);color:var(--bad);}

  /* =========================================================
     থিম ২ — মডার্ন মিনিমাল
     ========================================================= */
  body[data-theme="2"]{
    --ink:#0F172A; --ink-soft:#64748B; --paper:#F8FAFC; --panel:#FFFFFF;
    --accent:#2563EB; --accent2:#38BDF8; --line:#E2E8F0; --good:#16A34A; --bad:#DC2626; --radius:16px;
    background:var(--paper);color:var(--ink);font-family:"Inter","Hind Siliguri",sans-serif;
  }
  body[data-theme="2"] .ledger-top{background:#fff;color:var(--ink);padding:15px 24px;border-bottom:1px solid var(--line);}
  body[data-theme="2"] .ledger-top h1{font-family:"Inter","Hind Siliguri",sans-serif;font-weight:800;font-size:clamp(15px,2.2vw,19px);margin:0 0 3px;letter-spacing:-.3px;}
  body[data-theme="2"] .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:12px;margin-bottom:12px;}
  body[data-theme="2"] .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 16px;box-shadow:0 1px 2px rgba(15,23,42,.04);}
  body[data-theme="2"] .kpi .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);margin-bottom:10px;font-weight:600;}
  body[data-theme="2"] .kpi .num{font-family:"Inter",sans-serif;font-size:20px;font-weight:700;color:var(--accent);}
  body[data-theme="2"] .card,
  body[data-theme="2"] .table-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;box-shadow:0 1px 2px rgba(15,23,42,.04);}
  body[data-theme="2"] .card h2,
  body[data-theme="2"] .table-card h2{font-family:"Inter",sans-serif;font-weight:700;font-size:14.5px;margin:0 0 14px;color:var(--ink);}
  body[data-theme="2"] thead th{color:var(--ink);border-bottom:1px solid var(--line);}
  body[data-theme="2"] tbody td{border-bottom:1px solid var(--line);}
  body[data-theme="2"] tbody tr:hover{background:#F1F5F9;}
  body[data-theme="2"] tr.total-row td{background:#EFF6FF;}
  body[data-theme="2"] .error-box{background:#FEF2F2;border:1px solid var(--bad);color:var(--bad);border-radius:10px;}

  /* =========================================================
     থিম ৩ — ডার্ক অ্যানালিটিক্স
     ========================================================= */
  body[data-theme="3"]{
    --ink:#E2E8F0; --ink-soft:#94A3B8; --paper:#0B1120; --panel:#131B2E;
    --accent:#22D3EE; --accent2:#C084FC; --line:#1E293B; --good:#34D399; --bad:#F87171; --radius:12px;
    background:var(--paper);color:var(--ink);font-family:"Space Grotesk","Hind Siliguri",sans-serif;
  }
  body[data-theme="3"] .ledger-top{background:linear-gradient(180deg,#0B1120,#131B2E);color:#fff;padding:16px 24px;border-bottom:1px solid var(--line);}
  body[data-theme="3"] .ledger-top::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  body[data-theme="3"] .ledger-top h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(15px,2.2vw,19px);margin:0 0 3px;}
  body[data-theme="3"] .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:12px;}
  body[data-theme="3"] .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;}
  body[data-theme="3"] .kpi .eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-soft);margin-bottom:8px;font-weight:600;}
  body[data-theme="3"] .kpi .num{font-family:"Space Grotesk",sans-serif;font-size:20px;font-weight:700;color:var(--accent);text-shadow:0 0 14px rgba(34,211,238,.35);}
  body[data-theme="3"] .card,
  body[data-theme="3"] .table-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;}
  body[data-theme="3"] .card h2,
  body[data-theme="3"] .table-card h2{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14.5px;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--line);color:#fff;}
  body[data-theme="3"] thead th{color:var(--ink);border-bottom:1px solid var(--line);}
  body[data-theme="3"] tbody td{border-bottom:1px solid var(--line);}
  body[data-theme="3"] tbody tr:hover{background:#1A2338;}
  body[data-theme="3"] tr.total-row td{background:#17233B;box-shadow:inset 0 1px 0 var(--accent);}
  body[data-theme="3"] .error-box{background:#3B1418;border:1px solid var(--bad);color:#FCA5A5;}

  /* =========================================================
     থিম ৪ — গ্লাসমরফিজম
     ========================================================= */
  body[data-theme="4"]{
    --ink:#1E1B3A; --ink-soft:#5B5580; --panel:rgba(255,255,255,.55); --line:rgba(255,255,255,.6);
    --accent:#818CF8; --accent2:#F472B6; --good:#10B981; --bad:#EF4444; --radius:18px;
    color:var(--ink);font-family:"Inter","Hind Siliguri",sans-serif;
    background:radial-gradient(circle at 15% 10%, #C4B5FD 0%, transparent 45%),
               radial-gradient(circle at 85% 15%, #93C5FD 0%, transparent 45%),
               radial-gradient(circle at 50% 100%, #FBCFE8 0%, transparent 50%),
               linear-gradient(160deg,#EEF2FF,#F5F3FF 60%,#FCE7F3);
    background-attachment:fixed;
  }
  body[data-theme="4"] .ledger-top{background:rgba(255,255,255,.35);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:var(--ink);padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.6);}
  body[data-theme="4"] .ledger-top h1{font-family:"Inter",sans-serif;font-weight:800;font-size:clamp(15px,2.2vw,19px);margin:0 0 3px;letter-spacing:-.3px;}
  body[data-theme="4"] .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:12px;}
  body[data-theme="4"] .kpi{background:var(--panel);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:0 8px 24px rgba(99,102,241,.12);}
  body[data-theme="4"] .kpi .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);margin-bottom:8px;font-weight:600;}
  body[data-theme="4"] .kpi .num{font-family:"Inter",sans-serif;font-size:19px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  body[data-theme="4"] .card,
  body[data-theme="4"] .table-card{background:var(--panel);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:var(--radius);padding:12px;box-shadow:0 8px 24px rgba(99,102,241,.10);}
  body[data-theme="4"] .card h2,
  body[data-theme="4"] .table-card h2{font-family:"Inter",sans-serif;font-weight:700;font-size:14.5px;margin:0 0 14px;color:var(--ink);}
  body[data-theme="4"] thead th{color:var(--ink);border-bottom:1px solid rgba(30,27,58,.15);}
  body[data-theme="4"] tbody td{border-bottom:1px solid rgba(30,27,58,.08);}
  body[data-theme="4"] tbody tr:hover{background:rgba(255,255,255,.4);}
  body[data-theme="4"] tr.total-row td{background:rgba(255,255,255,.5);}
  body[data-theme="4"] .error-box{background:rgba(239,68,68,.12);border:1px solid var(--bad);color:#B91C1C;border-radius:12px;}

  /* =========================================================
     থিম ৫ — কর্পোরেট এক্সিকিউটিভ
     ========================================================= */
  body[data-theme="5"]{
    --ink:#1F2937; --ink-soft:#6B7280; --paper:#F3F4F1; --panel:#FFFFFF;
    --accent:#1B2A4A; --accent2:#8C1D2B; --line:#D9D5C9; --good:#2F6F4E; --bad:#8C1D2B; --radius:4px;
    background:var(--paper);color:var(--ink);font-family:"Hind Siliguri",sans-serif;
  }
  body[data-theme="5"] .ledger-top{background:#1B2A4A;color:#fff;padding:15px 24px;border-bottom:2px solid var(--accent2);}
  body[data-theme="5"] .ledger-top h1{font-family:"Playfair Display",serif;font-weight:700;font-size:clamp(15px,2.2vw,20px);margin:0 0 3px;}
  body[data-theme="5"] .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:0;margin-bottom:12px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel);}
  body[data-theme="5"] .kpi{background:var(--panel);border-right:1px solid var(--line);padding:18px 18px 16px;position:relative;}
  body[data-theme="5"] .kpi:last-child{border-right:none;}
  body[data-theme="5"] .kpi .eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-soft);margin-bottom:9px;font-weight:600;}
  body[data-theme="5"] .kpi .num{font-family:"Playfair Display",serif;font-size:19px;font-weight:700;color:var(--accent);}
  body[data-theme="5"] .card{background:var(--panel);border:1px solid var(--line);padding:12px;}
  body[data-theme="5"] .table-card{background:var(--panel);border:1px solid var(--line);padding:12px;}
  body[data-theme="5"] .card h2,
  body[data-theme="5"] .table-card h2{font-family:"Playfair Display",serif;font-weight:600;font-size:15px;margin:0 0 14px;padding-bottom:10px;border-bottom:2px solid var(--accent);color:var(--ink);}
  body[data-theme="5"] thead th{color:var(--ink);border-bottom:2px solid var(--ink);}
  body[data-theme="5"] tbody td{border-bottom:1px solid var(--line);}
  body[data-theme="5"] tbody tr:hover{background:#F7F6F2;}
  body[data-theme="5"] tr.total-row td{background:#F1EFE8;border-top:2px solid var(--accent2);}
  body[data-theme="5"] .error-box{background:#FBEAE7;border:1px solid var(--bad);color:var(--bad);}
</style>
</head>
<body data-theme="2">

<div class="ledger-top">
  <h1>Admission 2026 — Board Data Synchronization Summary</h1>
</div>

<div class="top-wrap">
  <div id="errorArea"></div>
  <div id="kpiRow" class="kpi-row"></div>
</div>

<div class="scroll-viewport" id="scrollViewport">
  <section class="snap-section" id="sectionTable"><div class="wrap"></div></section>
  <section class="snap-section" id="sectionRace"><div class="wrap"></div></section>
</div>

<div class="snap-dots" id="snapDots">
  <button class="snap-dot" data-snap-idx="0" aria-label="প্রোগ্রামভিত্তিক বিস্তারিত সামারি" title="প্রোগ্রামভিত্তিক বিস্তারিত সামারি"></button>
  <button class="snap-dot" data-snap-idx="1" aria-label="SSC ও HSC ডাটা তুলনা" title="SSC ও HSC ডাটা তুলনা"></button>
</div>

<button class="view-fab" id="viewFab" aria-label="View by" title="View By">🧭</button>
<div class="view-panel" id="viewPanel">
  <div class="tp-label">View By</div>
  <div id="viewList">
    <div class="tp-theme-row" data-view-pick="program">Program Wise</div>
    <div class="tp-theme-row" data-view-pick="branch">Branch Wise</div>
    <div class="tp-theme-row" data-view-pick="branchProgram">Branch Program Wise</div>
  </div>
</div>

<button class="theme-fab" id="themeFab" aria-label="Theme settings" title="Theme settings">🎨</button>
<div class="theme-panel" id="themePanel">
  <div class="tp-label">Theme</div>
  <div id="tpThemeList"></div>
  <div class="tp-label tp-label-2">Palette</div>
  <div class="tp-palette-row">
    <div class="tp-color-col"><input type="color" class="tp-color-input" id="tpPrimary"><span>Primary</span></div>
    <div class="tp-color-col"><input type="color" class="tp-color-input" id="tpSecondary"><span>Secondary</span></div>
    <div class="tp-color-col"><input type="color" class="tp-color-input" id="tpBg"><span>BG</span></div>
  </div>
  <button class="tp-reset-btn" id="tpReset">↺ Reset Colors</button>
</div>

<script>
let programRows = null, programTotals = null, programTotalLabel = "মোট আবেদন";
let branchRows = null, branchTotals = null;
let branchProgramRows = null, branchProgramTotals = null;
let currentView = localStorage.getItem("ap26bd_view") || "program";

const THEME_PALETTE = {
  1: { ssc:"#1B2A4A", hsc:"#8A6FB0" },
  2: { ssc:"#2563EB", hsc:"#38BDF8" },
  3: { ssc:"#22D3EE", hsc:"#C084FC" },
  4: { ssc:"#818CF8", hsc:"#F472B6" },
  5: { ssc:"#1B2A4A", hsc:"#8C1D2B" }
};
const THEME_NAMES = {
  1: "ক্লাসিক লেজার", 2: "মডার্ন মিনিমাল", 3: "ডার্ক অ্যানালিটিক্স", 4: "গ্লাসমরফিজম", 5: "কর্পোরেট এক্সিকিউটিভ"
};
const THEME_ORDER = ["2","4","1","5","3"];
const THEME_BG_SWATCH = { 1:"#F7F5F0", 2:"#F8FAFC", 3:"#0B1120", 4:"#EEF2FF", 5:"#F3F4F1" };
let customColors = { primary:null, secondary:null, bg:null };

function currentTheme(){ return document.body.getAttribute("data-theme"); }
function getActivePalette(){
  const base = THEME_PALETTE[currentTheme()];
  return { ssc: customColors.primary || base.ssc, hsc: customColors.secondary || base.hsc };
}
const PROGRAM_BRAND = {
  "Medical": ["Unmesh", "OnlineCare"],
  "Engineering": ["Udvash", "OnlineCare"],
  "Varsity 'KA'": ["Udvash", "OnlineCare"],
  "Varsity 'KHA'": ["Udvash", "OnlineCare"]
};
function shortName(program){
  const name = program.replace(" Admission Program", "");
  const isOnline = name.includes("(Online)");
  const base = name.replace(" (Online)", "");
  const brand = PROGRAM_BRAND[base];
  if(brand) return `${base} (${isOnline ? brand[1] : brand[0]})`;
  return isOnline ? name.replace("(Online)", "(অনলাইন)") : name;
}

function showError(msg){
  document.getElementById("errorArea").innerHTML = `<div class="error-box">⚠ ${msg}</div>`;
}
function num(v){
  if(v === undefined || v === null) return 0;
  const n = parseFloat(String(v).replace(/,/g,"").trim());
  return isNaN(n) ? 0 : n;
}
function pct(a,b){ return b > 0 ? Math.round((a/b)*1000)/10 : 0; }

async function loadData(){
  try{
    const res = await fetch(CONFIG.CSV_URL + (CONFIG.CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now());
    if(!res.ok) throw new Error("HTTP " + res.status);
    const csvText = await res.text();
    const grid = Papa.parse(csvText, { header:false, skipEmptyLines:false }).data;
    parseAndRender(grid);
    document.getElementById("errorArea").innerHTML = "";
  }catch(err){
    showError("ডাটা লোড করা যায়নি। শীটের শেয়ারিং/পাবলিশ সেটিংস যাচাই করুন। (" + err.message + ")");
  }
}

/* ============ শীটে "Sl" লেখা প্রতিটা টেবিলের হেডার-পজিশন খুঁজে বের করা (Program Wise / Branch Wise / Branch & Program Wise — এই তিনটা টেবিল একই শীটে পরপর থাকে) ============ */
function findSlPositions(grid){
  const positions = [];
  for(let r=0; r<grid.length; r++){
    for(let c=0; c<grid[r].length; c++){
      const v = (grid[r][c] || "").toString().trim().toLowerCase();
      if(v === "sl" || v === "sl."){ positions.push({row:r, col:c}); break; }
    }
  }
  return positions;
}

function statsFromRow(row, totalCol){
  const sscYesCol=totalCol+1, sscNoCol=totalCol+2, sscSyncYesCol=totalCol+3, sscSyncNoCol=totalCol+4;
  const hscYesCol=totalCol+5, hscNoCol=totalCol+6, hscSyncYesCol=totalCol+7, hscSyncNoCol=totalCol+8;
  return {
    total: num(row[totalCol]),
    sscYes: num(row[sscYesCol]), sscNo: num(row[sscNoCol]),
    sscSyncYes: num(row[sscSyncYesCol]), sscSyncNo: num(row[sscSyncNoCol]),
    hscYes: num(row[hscYesCol]), hscNo: num(row[hscNoCol]),
    hscSyncYes: num(row[hscSyncYesCol]), hscSyncNo: num(row[hscSyncNoCol])
  };
}

/* labelColCount=1 → Sl,Program বা Sl,Branch (Program Wise / Branch Wise); labelColCount=2 → Sl,Branch,Program (Branch & Program Wise) */
function parseSubTable(grid, slRow, slCol, labelColCount){
  const label1Col = slCol + 1;
  const label2Col = slCol + 2;
  const totalCol = slCol + 1 + labelColCount;
  const rows = [];
  let totals = null, blankStreak = 0;

  for(let r = slRow + 1; r < grid.length; r++){
    const row = grid[r] || [];
    const slText = (row[slCol] || "").toString().trim();
    const label1 = (row[label1Col] || "").toString().trim();
    const label2 = labelColCount === 2 ? (row[label2Col] || "").toString().trim() : "";

    const isTotalRow = /total/i.test(slText) ||
      (!slText && !label1 && (labelColCount < 2 || !label2) && num(row[totalCol]) > 0);

    if(isTotalRow){
      totals = statsFromRow(row, totalCol);
      break;
    }
    if(/^\d+$/.test(slText) && label1){
      const stats = statsFromRow(row, totalCol);
      rows.push({ sl:slText, label1, label2, total:stats.total,
        sscYes:stats.sscYes, sscNo:stats.sscNo, sscSyncYes:stats.sscSyncYes, sscSyncNo:stats.sscSyncNo,
        hscYes:stats.hscYes, hscNo:stats.hscNo, hscSyncYes:stats.hscSyncYes, hscSyncNo:stats.hscSyncNo });
      blankStreak = 0;
    } else {
      blankStreak++;
      if(blankStreak > 8) break;
    }
  }

  if(!totals && rows.length){
    totals = rows.reduce((a,r) => ({
      total:a.total+r.total, sscYes:a.sscYes+r.sscYes, sscNo:a.sscNo+r.sscNo,
      sscSyncYes:a.sscSyncYes+r.sscSyncYes, sscSyncNo:a.sscSyncNo+r.sscSyncNo,
      hscYes:a.hscYes+r.hscYes, hscNo:a.hscNo+r.hscNo,
      hscSyncYes:a.hscSyncYes+r.hscSyncYes, hscSyncNo:a.hscSyncNo+r.hscSyncNo
    }), {total:0,sscYes:0,sscNo:0,sscSyncYes:0,sscSyncNo:0,hscYes:0,hscNo:0,hscSyncYes:0,hscSyncNo:0});
  }

  return { rows, totals, totalCol };
}

function parseAndRender(grid){
  const slPositions = findSlPositions(grid);
  if(!slPositions.length){ showError("শীটের হেডার কাঠামো চেনা যায়নি (Sl কলাম পাওয়া যায়নি)।"); return; }

  const t1 = parseSubTable(grid, slPositions[0].row, slPositions[0].col, 1);
  if(!t1.rows.length){ showError("কোনো প্রোগ্রামের ডাটা পাওয়া যায়নি।"); return; }
  programRows = t1.rows.map(r => ({ sl:r.sl, program:r.label1, total:r.total,
    sscYes:r.sscYes, sscNo:r.sscNo, sscSyncYes:r.sscSyncYes, sscSyncNo:r.sscSyncNo,
    hscYes:r.hscYes, hscNo:r.hscNo, hscSyncYes:r.hscSyncYes, hscSyncNo:r.hscSyncNo }));
  programTotals = t1.totals;
  programTotalLabel = (grid[slPositions[0].row][t1.totalCol] || "মোট আবেদন").toString().trim();

  branchRows = null; branchTotals = null;
  if(slPositions[1]){
    const t2 = parseSubTable(grid, slPositions[1].row, slPositions[1].col, 1);
    if(t2.rows.length){
      branchRows = t2.rows.map(r => ({ sl:r.sl, branch:r.label1, total:r.total,
        sscYes:r.sscYes, sscNo:r.sscNo, sscSyncYes:r.sscSyncYes, sscSyncNo:r.sscSyncNo,
        hscYes:r.hscYes, hscNo:r.hscNo, hscSyncYes:r.hscSyncYes, hscSyncNo:r.hscSyncNo }));
      branchTotals = t2.totals;
    }
  }

  branchProgramRows = null; branchProgramTotals = null;
  if(slPositions[2]){
    const t3 = parseSubTable(grid, slPositions[2].row, slPositions[2].col, 2);
    if(t3.rows.length){
      branchProgramRows = t3.rows.map(r => ({ sl:r.sl, branch:r.label1, program:r.label2, total:r.total,
        sscYes:r.sscYes, sscNo:r.sscNo, sscSyncYes:r.sscSyncYes, sscSyncNo:r.sscSyncNo,
        hscYes:r.hscYes, hscNo:r.hscNo, hscSyncYes:r.hscSyncYes, hscSyncNo:r.hscSyncNo }));
      branchProgramTotals = t3.totals;
    }
  }

  renderAll();
}

function renderAll(){
  if(!programRows || !programTotals) return;
  renderKPIs(programTotals, programTotalLabel || "মোট আবেদন");
  renderDetailSection();
}

function eyebrowHtml(label){
  const m = /^(.*?)\s*(\([^)]*\)\s*)$/.exec(label);
  return m ? `${m[1]}<br>${m[2].trim()}` : label;
}
function renderKPIs(t, totalLabel){
  const sscPct = pct(t.sscYes, t.total);
  const hscPct = pct(t.hscYes, t.total);
  const sscSyncPct = pct(t.sscSyncYes, t.total);
  const hscSyncPct = pct(t.hscSyncYes, t.total);
  const countPct = (count, p) => `${count.toLocaleString("en-US")} (${p}%)`;
  const kpis = [
    {label: totalLabel, value: t.total.toLocaleString("en-US")},
    {label:"SSC ডাটা সংগ্রহ", value: countPct(t.sscYes, sscPct)},
    {label:"HSC ডাটা সংগ্রহ", value: countPct(t.hscYes, hscPct)},
    {label:"SSC সিঙ্ক্রোনাইজড", value: countPct(t.sscSyncYes, sscSyncPct)},
    {label:"HSC সিঙ্ক্রোনাইজড", value: countPct(t.hscSyncYes, hscSyncPct)}
  ];
  document.getElementById("kpiRow").innerHTML = kpis.map(k =>
    `<div class="kpi"><div class="eyebrow">${eyebrowHtml(k.label)}</div><div class="num">${k.value}</div></div>`
  ).join("");
}

function statCellHtml(count, pctVal, color){
  return `<td>
      <div class="stat-count">${count.toLocaleString("en-US")}</div>
      <div class="stat-pct" style="color:${color};background:${color}1F">${pctVal}%</div>
    </td>`;
}

function tableCardHtml(rows, totals, p, labelHeader, labelKey, scrollable){
  const rowHtml = (label, r, isTotal) => {
    const sscP = pct(r.sscYes, r.total), hscP = pct(r.hscYes, r.total);
    const sscSyncP = pct(r.sscSyncYes, r.total), hscSyncP = pct(r.hscSyncYes, r.total);
    return `<tr${isTotal ? ' class="total-row"' : ''}>
      <td class="left">${isTotal ? '' : r.sl}</td>
      <td class="left">${label}</td>
      <td>${r.total.toLocaleString("en-US")}</td>
      ${statCellHtml(r.sscYes, sscP, p.ssc)}
      ${statCellHtml(r.sscSyncYes, sscSyncP, p.ssc)}
      ${statCellHtml(r.hscYes, hscP, p.hsc)}
      ${statCellHtml(r.hscSyncYes, hscSyncP, p.hsc)}
    </tr>`;
  };
  let bodyHtml = rows.map(r => rowHtml(r[labelKey], r, false)).join("");
  bodyHtml += rowHtml("সর্বমোট", totals, true);
  return `<div class="table-card${scrollable ? ' scroll-body' : ''}">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="left">Sl</th>
            <th class="left">${labelHeader}</th>
            <th>মোট ডাটা</th>
            <th>SSC সংগ্রহ</th>
            <th>SSC সিঙ্ক</th>
            <th>HSC সংগ্রহ</th>
            <th>HSC সিঙ্ক</th>
          </tr>
        </thead>
        <tbody>${bodyHtml}</tbody>
      </table>
    </div>
  </div>`;
}

/* Branch & Program Wise — শাখা অনুযায়ী গ্রুপ করে দেখায় (প্রতিটা শাখার নিচে শুধু যে প্রোগ্রামগুলোর ডাটা আছে সেগুলোর রো) */
function groupedTableHtml(rows, totals, p){
  const rowHtml = (r) => {
    const sscP = pct(r.sscYes, r.total), hscP = pct(r.hscYes, r.total);
    const sscSyncP = pct(r.sscSyncYes, r.total), hscSyncP = pct(r.hscSyncYes, r.total);
    return `<tr>
      <td class="left"></td>
      <td class="left indent">${r.program}</td>
      <td>${r.total.toLocaleString("en-US")}</td>
      ${statCellHtml(r.sscYes, sscP, p.ssc)}
      ${statCellHtml(r.sscSyncYes, sscSyncP, p.ssc)}
      ${statCellHtml(r.hscYes, hscP, p.hsc)}
      ${statCellHtml(r.hscSyncYes, hscSyncP, p.hsc)}
    </tr>`;
  };

  const branchTotalMap = {};
  rows.forEach(r => { branchTotalMap[r.branch] = (branchTotalMap[r.branch] || 0) + r.total; });

  let bodyHtml = "";
  let curBranch = null;
  rows.forEach(r => {
    if(r.branch !== curBranch){
      curBranch = r.branch;
      bodyHtml += `<tr class="group-row"><td colspan="7" class="left">${curBranch}<span class="group-total">মোট ${branchTotalMap[curBranch].toLocaleString("en-US")}</span></td></tr>`;
    }
    bodyHtml += rowHtml(r);
  });

  const sscP = pct(totals.sscYes, totals.total), hscP = pct(totals.hscYes, totals.total);
  const sscSyncP = pct(totals.sscSyncYes, totals.total), hscSyncP = pct(totals.hscSyncYes, totals.total);
  bodyHtml += `<tr class="total-row">
    <td class="left" colspan="2">সর্বমোট</td>
    <td>${totals.total.toLocaleString("en-US")}</td>
    ${statCellHtml(totals.sscYes, sscP, p.ssc)}
    ${statCellHtml(totals.sscSyncYes, sscSyncP, p.ssc)}
    ${statCellHtml(totals.hscYes, hscP, p.hsc)}
    ${statCellHtml(totals.hscSyncYes, hscSyncP, p.hsc)}
  </tr>`;

  return `<div class="table-card scroll-body">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="left"></th>
            <th class="left">Branch / Program</th>
            <th>মোট ডাটা</th>
            <th>SSC সংগ্রহ</th>
            <th>SSC সিঙ্ক</th>
            <th>HSC সংগ্রহ</th>
            <th>HSC সিঙ্ক</th>
          </tr>
        </thead>
        <tbody>${bodyHtml}</tbody>
      </table>
    </div>
  </div>`;
}

function raceBarHtml(rows, p){
  const barRow = (label, count, total, color) => {
    const pctVal = pct(count, total);
    return `<div class="race-row"><span class="race-label">${label}</span><div class="race-track"><i style="width:${pctVal}%;background:${color}"></i></div><span class="race-pct">${count.toLocaleString("en-US")} (${pctVal}%)</span></div>`;
  };
  const groupHtml = (r) => `<div class="race-group">
      <div class="race-title"><span>${shortName(r.program)}</span><span class="race-total">মোট ${r.total.toLocaleString("en-US")}</span></div>
      ${barRow("SSC এন্ট্রি", r.sscYes, r.total, p.ssc)}
      ${barRow("SSC সিঙ্ক", r.sscSyncYes, r.total, p.ssc)}
      ${barRow("HSC এন্ট্রি", r.hscYes, r.total, p.hsc)}
      ${barRow("HSC সিঙ্ক", r.hscSyncYes, r.total, p.hsc)}
    </div>`;

  const offline = rows.filter(r => !r.program.includes("(Online)"));
  const online = rows.filter(r => r.program.includes("(Online)"));
  const colHtml = (label, list) => `<div class="race-col"><div class="race-col-head">${label}</div>${list.map(groupHtml).join("")}</div>`;

  return `<div class="card"><div class="race-cols">${colHtml("Udvash / Unmesh", offline)}${colHtml("OnlineCare", online)}</div></div>`;
}

function renderDetailSection(){
  const p = getActivePalette();
  const sectionRaceEl = document.getElementById("sectionRace");
  const snapDotsEl = document.getElementById("snapDots");
  const tableWrap = document.querySelector("#sectionTable .wrap");

  if(currentView === "program"){
    sectionRaceEl.style.display = "";
    snapDotsEl.style.display = "";
    tableWrap.className = "wrap";
    tableWrap.innerHTML = tableCardHtml(programRows, programTotals, p, "Program", "program", false);
    document.querySelector("#sectionRace .wrap").innerHTML = raceBarHtml(programRows, p);
  } else if(currentView === "branch"){
    sectionRaceEl.style.display = "none";
    snapDotsEl.style.display = "none";
    tableWrap.className = "wrap fill";
    tableWrap.innerHTML = branchRows
      ? tableCardHtml(branchRows, branchTotals, p, "Branch", "branch", true)
      : `<div class="error-box">⚠ Branch Wise ডাটা শীটে পাওয়া যায়নি।</div>`;
  } else if(currentView === "branchProgram"){
    sectionRaceEl.style.display = "none";
    snapDotsEl.style.display = "none";
    tableWrap.className = "wrap fill";
    tableWrap.innerHTML = branchProgramRows
      ? groupedTableHtml(branchProgramRows, branchProgramTotals, p)
      : `<div class="error-box">⚠ Branch Program Wise ডাটা শীটে পাওয়া যায়নি।</div>`;
  }
}

/* ============ থিম + প্যালেট কাস্টমাইজার (ফ্লোটিং প্যানেল) ============ */
const themeFab = document.getElementById("themeFab");
const themePanel = document.getElementById("themePanel");
const tpThemeList = document.getElementById("tpThemeList");
const tpPrimary = document.getElementById("tpPrimary");
const tpSecondary = document.getElementById("tpSecondary");
const tpBg = document.getElementById("tpBg");

tpThemeList.innerHTML = THEME_ORDER.map(n =>
  `<div class="tp-theme-row" data-theme-pick="${n}"><span class="tp-swatch" style="background:${THEME_PALETTE[n].ssc}"></span>${THEME_NAMES[n]}</div>`
).join("");

function refreshThemeRowHighlight(){
  const n = currentTheme();
  document.querySelectorAll("[data-theme-pick]").forEach(row => {
    row.classList.toggle("active", row.getAttribute("data-theme-pick") === String(n));
  });
}

function refreshColorInputs(){
  const base = THEME_PALETTE[currentTheme()];
  tpPrimary.value = customColors.primary || base.ssc;
  tpSecondary.value = customColors.secondary || base.hsc;
  tpBg.value = customColors.bg || THEME_BG_SWATCH[currentTheme()];
}

function setTheme(n){
  document.body.setAttribute("data-theme", n);
  localStorage.setItem("ap26bd_theme_preview", n);
  customColors = { primary:null, secondary:null, bg:null };
  localStorage.removeItem("ap26bd_custom_colors");
  document.body.style.background = "";
  refreshThemeRowHighlight();
  refreshColorInputs();
  renderAll();
}

document.querySelectorAll("[data-theme-pick]").forEach(row => {
  row.addEventListener("click", () => setTheme(row.getAttribute("data-theme-pick")));
});

function saveCustomColors(){
  localStorage.setItem("ap26bd_custom_colors", JSON.stringify(customColors));
}

tpPrimary.addEventListener("input", () => {
  customColors.primary = tpPrimary.value;
  saveCustomColors();
  renderAll();
});
tpSecondary.addEventListener("input", () => {
  customColors.secondary = tpSecondary.value;
  saveCustomColors();
  renderAll();
});
tpBg.addEventListener("input", () => {
  customColors.bg = tpBg.value;
  document.body.style.background = tpBg.value;
  saveCustomColors();
});

document.getElementById("tpReset").addEventListener("click", () => {
  customColors = { primary:null, secondary:null, bg:null };
  localStorage.removeItem("ap26bd_custom_colors");
  document.body.style.background = "";
  refreshColorInputs();
  renderAll();
});

themeFab.addEventListener("click", (e) => {
  e.stopPropagation();
  viewPanel.classList.remove("open");
  themePanel.classList.toggle("open");
});
document.addEventListener("click", (e) => {
  if(!themePanel.contains(e.target) && e.target !== themeFab){
    themePanel.classList.remove("open");
  }
});

/* ============ "View By" পিকার (ফ্লোটিং প্যানেল) ============ */
const viewFab = document.getElementById("viewFab");
const viewPanel = document.getElementById("viewPanel");

function refreshViewRowHighlight(){
  document.querySelectorAll("[data-view-pick]").forEach(row => {
    row.classList.toggle("active", row.getAttribute("data-view-pick") === currentView);
  });
}

function setView(v){
  currentView = v;
  localStorage.setItem("ap26bd_view", v);
  refreshViewRowHighlight();
  scrollViewport.scrollTop = 0;
  renderAll();
}

document.querySelectorAll("[data-view-pick]").forEach(row => {
  row.addEventListener("click", () => setView(row.getAttribute("data-view-pick")));
});

viewFab.addEventListener("click", (e) => {
  e.stopPropagation();
  themePanel.classList.remove("open");
  viewPanel.classList.toggle("open");
});
document.addEventListener("click", (e) => {
  if(!viewPanel.contains(e.target) && e.target !== viewFab){
    viewPanel.classList.remove("open");
  }
});

/* ============ এক-উইন্ডোতে-এক-সেকশন স্ক্রল-স্ন্যাপ ডট ইন্ডিকেটর ============ */
const scrollViewport = document.getElementById("scrollViewport");
const snapSections = Array.from(document.querySelectorAll(".snap-section"));
const snapDots = Array.from(document.querySelectorAll(".snap-dot"));

snapDots.forEach((dot, idx) => {
  dot.addEventListener("click", () => {
    snapSections[idx].scrollIntoView({behavior:"smooth", block:"start"});
  });
});

const snapObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      const idx = snapSections.indexOf(entry.target);
      snapDots.forEach((d,i) => d.classList.toggle("active", i === idx));
    }
  });
}, { root: scrollViewport, threshold: 0.5 });

snapSections.forEach(sec => snapObserver.observe(sec));
snapDots[0].classList.add("active");

const savedTheme = localStorage.getItem("ap26bd_theme_preview") || "2";
document.body.setAttribute("data-theme", savedTheme);
try{
  const savedColors = JSON.parse(localStorage.getItem("ap26bd_custom_colors") || "null");
  if(savedColors) customColors = savedColors;
}catch(e){}
if(customColors.bg) document.body.style.background = customColors.bg;
refreshThemeRowHighlight();
refreshColorInputs();
refreshViewRowHighlight();

loadData();
setInterval(loadData, CONFIG.REFRESH_MINUTES * 60 * 1000);
</script>
